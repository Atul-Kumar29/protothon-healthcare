x-airflow-common: &airflow-common
  image: apache/airflow:2.8.1
  environment:
    - AIRFLOW__CORE__EXECUTOR=LocalExecutor
    - AIRFLOW__DATABASE__SQL_ALCHEMY_CONN=postgresql+psycopg2://airflow:airflow@postgres/airflow
    - AIRFLOW__CORE__LOAD_EXAMPLES=False
  volumes:
    - ./dags:/opt/airflow/dags
    - ./data:/opt/airflow/data
  depends_on:
    - postgres

services:
  # 1. Database for Airflow Metadata
  postgres:
    image: postgres:13
    environment:
      - POSTGRES_USER=airflow
      - POSTGRES_PASSWORD=airflow
      - POSTGRES_DB=airflow
    ports:
      - "5432:5432"

  # 2. Airflow Webserver (UI & Initialization)
  airflow-webserver:
    <<: *airflow-common
    command: >
      bash -c "airflow db migrate &&  airflow users create --username admin --password admin --firstname Admin --lastname User --role Admin --email admin@example.com &&  airflow webserver"
    ports:
      - "8080:8080"

  # 3. Airflow Scheduler
  airflow-scheduler:
    <<: *airflow-common
    command: airflow scheduler

  # 4. Apache Spark Master Node
  spark-master:
    image: bitnamilegacy/spark:latest
    environment:
      - SPARK_MODE=master
    ports:
      - "8081:8080"
      - "7077:7077"
    volumes:
      - ./data:/opt/bitnami/spark/data

  # 5. Apache Spark Worker Node (Tuned for Asus TUF F15)
  spark-worker:
    image: bitnamilegacy/spark:latest
    environment:
      - SPARK_MODE=worker
      - SPARK_MASTER_URL=spark://spark-master:7077
      - SPARK_WORKER_MEMORY=4G
      - SPARK_WORKER_CORES=4
    volumes:
      - ./data:/opt/bitnami/spark/data
    depends_on:
      - spark-master
